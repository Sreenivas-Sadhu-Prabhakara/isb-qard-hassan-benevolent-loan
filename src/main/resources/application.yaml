spring:
  application:
    name: isb-qard-hassan-benevolent-loan

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Qard Hassan Benevolent Loan"
    businessArea: "Islamic Financing"
    businessDomain: "Lease And Partnership Financing"
    functionalPattern: "Fulfill"
    assetType: "Qard Hassan Facility"
    controlRecord: "Qard Hassan Facility Fulfillment Arrangement"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
